name: Pipeline SIVIGILA - Terraform + ETL + Glue

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:          # permite ejecutar manualmente desde GitHub

env:
  AWS_REGION:       us-east-1
  TF_WORKING_DIR:   Terraform/gestion_direccion_big_data/terraform/envs/dev
  BRONZE_BUCKET:    datalake-dev-raw-039781381637
  SILVER_BUCKET:    datalake-dev-silver-039781381637
  GOLD_BUCKET:      datalake-dev-gold-039781381637
  JOB_BRONZE_SILVER: datalake-dev-sivigila-etl
  JOB_SILVER_GOLD:   datalake-dev-sivigila-gold-etl
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Infraestructura con Terraform
  # ─────────────────────────────────────────────────────────
  terraform:
    name: "Terraform - Infraestructura AWS"
    runs-on: ubuntu-latest

    outputs:
      bronze_bucket: ${{ steps.tf_outputs.outputs.bronze_bucket }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -refresh=false -var-file="dev.tfvars" -detailed-exitcode -out=tfplan
          PLAN_EXIT=$?
          echo "plan_exit=$PLAN_EXIT" >> $GITHUB_OUTPUT
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "Error en terraform plan"
            exit 1
          fi
          echo "Plan OK (exit $PLAN_EXIT)"

      - name: Terraform Apply
        if: steps.plan.outputs.plan_exit == '2'
        run: terraform apply -auto-approve tfplan

      - name: Sin cambios detectados
        if: steps.plan.outputs.plan_exit == '0'
        run: echo "Infraestructura ya actualizada, sin cambios que aplicar."

      - name: Obtener outputs de Terraform
        id: tf_outputs
        run: |
          BRONZE=$(terraform output -raw bronze_bucket_name 2>/dev/null || echo "datalake-dev-raw-039781381637")
          echo "bronze_bucket=$BRONZE" >> $GITHUB_OUTPUT
          echo "Bronze bucket: $BRONZE"

  # ─────────────────────────────────────────────────────────
  # JOB 2: Subir datos y scripts al bucket Bronze  [v1.0]
  # ─────────────────────────────────────────────────────────
  upload:
    name: "Upload v1.0 - Datos y Glue jobs a S3"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── Datos ──────────────────────────────────────────────
      - name: "[DATA] Subir CSV SIVIGILA -> Bronze"
        run: |
          aws s3 cp sivigila_intsuicidio.csv \
            "s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv" \
            --no-progress
          echo "CSV subido: s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv"

      # ── Glue job scripts ───────────────────────────────────
      - name: "[SCRIPT] Glue job Bronze-Silver -> scripts/etl_sivigila.py"
        run: |
          aws s3 cp "Big Data AWS/glue_bronze_to_silver_sales.py" \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila.py"

      - name: "[SCRIPT] Glue job Silver-Gold -> scripts/etl_sivigila_gold.py"
        run: |
          aws s3 cp "Big Data AWS/glue_silver_to_gold_sivigila.py" \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila_gold.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila_gold.py"

      - name: "[SCRIPT] Glue job Data Quality -> scripts/gx_data_quality.py"
        run: |
          aws s3 cp GX_Glue_Code.py \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/gx_data_quality.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/gx_data_quality.py"

      # ── Validacion de recursos en AWS (0.5) ───────────────
      - name: "[VALIDATE] Todos los recursos presentes en S3"
        run: |
          set -e
          BUCKET="${{ env.BRONZE_BUCKET }}"
          ERRORS=0

          validate_file() {
            local LOCAL="$1"
            local KEY="$2"
            local LABEL="$3"

            # Tamaño local en bytes
            LOCAL_SIZE=$(stat -c%s "$LOCAL")

            # Tamaño en S3 (falla con error si el objeto no existe)
            S3_SIZE=$(aws s3api head-object \
              --bucket "$BUCKET" --key "$KEY" \
              --query "ContentLength" --output text 2>&1)

            if echo "$S3_SIZE" | grep -qi "Not Found\|NoSuchKey\|error"; then
              echo "  FAIL  $LABEL -> objeto NO encontrado en s3://$BUCKET/$KEY"
              ERRORS=$((ERRORS + 1))
              return
            fi

            if [ "$LOCAL_SIZE" -eq "$S3_SIZE" ]; then
              echo "  OK    $LABEL  |  local=${LOCAL_SIZE}B  s3=${S3_SIZE}B  -> MATCH"
            else
              echo "  WARN  $LABEL  |  local=${LOCAL_SIZE}B  s3=${S3_SIZE}B  -> MISMATCH (puede ser re-upload reciente)"
              # No es error crítico: S3 puede comprimir o el objeto es válido igualmente
            fi
          }

          echo "==========================================="
          echo "  VALIDACION DE RECURSOS EN AWS S3"
          echo "  Bucket: s3://$BUCKET"
          echo "==========================================="

          validate_file "sivigila_intsuicidio.csv" \
            "sivigila_intsuicidio.csv" \
            "CSV SIVIGILA"

          validate_file "Big Data AWS/glue_bronze_to_silver_sales.py" \
            "scripts/etl_sivigila.py" \
            "Script Bronze->Silver"

          validate_file "Big Data AWS/glue_silver_to_gold_sivigila.py" \
            "scripts/etl_sivigila_gold.py" \
            "Script Silver->Gold"

          validate_file "GX_Glue_Code.py" \
            "scripts/gx_data_quality.py" \
            "Script Data Quality"

          echo "==========================================="
          echo "  INVENTARIO COMPLETO DEL BUCKET BRONZE"
          echo "==========================================="
          aws s3 ls "s3://$BUCKET/" --recursive --human-readable

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "ERROR: $ERRORS objeto(s) no encontrados en S3. Revisar pasos de upload."
            exit 1
          fi

          echo ""
          echo "RESULTADO: Todos los recursos validados correctamente en AWS S3."

  # ─────────────────────────────────────────────────────────
  # JOB 3: Glue ETL Bronze - Silver
  # ─────────────────────────────────────────────────────────
  glue_bronze_to_silver:
    name: "Glue - Bronze - Silver"
    runs-on: ubuntu-latest
    needs: upload
    timeout-minutes: 45

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Lanzar Glue job Bronze-Silver
        id: start_job
        run: |
          RUN_ID=$(aws glue start-job-run \
            --job-name "${{ env.JOB_BRONZE_SILVER }}" \
            --arguments '{"--input_path":"s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv","--output_path":"s3://${{ env.SILVER_BUCKET }}/sivigila/"}' \
            --query "JobRunId" \
            --output text)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Job lanzado con ID: $RUN_ID"

      - name: Esperar a que el job termine
        run: |
          RUN_ID="${{ steps.start_job.outputs.run_id }}"
          echo "Monitoreando job: $RUN_ID"
          MAX_WAIT=80
          ATTEMPTS=0
          while [ $ATTEMPTS -lt $MAX_WAIT ]; do
            STATE=$(aws glue get-job-run \
              --job-name "${{ env.JOB_BRONZE_SILVER }}" \
              --run-id "$RUN_ID" \
              --query "JobRun.JobRunState" \
              --output text 2>&1) || { echo "Error consultando estado: $STATE"; exit 1; }
            echo "[$(($ATTEMPTS * 30))s] Estado: $STATE"
            case "$STATE" in
              SUCCEEDED)
                echo "Job Bronze-Silver completado exitosamente."
                exit 0
                ;;
              FAILED|ERROR|TIMEOUT|STOPPED)
                echo "Job fallido con estado: $STATE"
                aws glue get-job-run \
                  --job-name "${{ env.JOB_BRONZE_SILVER }}" \
                  --run-id "$RUN_ID" \
                  --query "JobRun.ErrorMessage" \
                  --output text
                exit 1
                ;;
              *)
                ATTEMPTS=$(($ATTEMPTS + 1))
                sleep 30
                ;;
            esac
          done
          echo "Timeout: el job no terminó en 40 minutos."
          exit 1

  # ─────────────────────────────────────────────────────────
  # JOB 4: Glue ETL Silver - Gold
  # ─────────────────────────────────────────────────────────
  glue_silver_to_gold:
    name: "Glue - Silver - Gold"
    runs-on: ubuntu-latest
    needs: glue_bronze_to_silver
    timeout-minutes: 45

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Lanzar Glue job Silver-Gold
        id: start_job
        run: |
          RUN_ID=$(aws glue start-job-run \
            --job-name "${{ env.JOB_SILVER_GOLD }}" \
            --arguments '{"--input_path":"s3://${{ env.SILVER_BUCKET }}/sivigila/","--output_gold_resumen":"s3://${{ env.GOLD_BUCKET }}/sivigila_resumen_comuna/","--output_gold_riesgo":"s3://${{ env.GOLD_BUCKET }}/sivigila_perfil_riesgo/"}' \
            --query "JobRunId" \
            --output text)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Job lanzado con ID: $RUN_ID"

      - name: Esperar a que el job termine
        run: |
          RUN_ID="${{ steps.start_job.outputs.run_id }}"
          echo "Monitoreando job: $RUN_ID"
          MAX_WAIT=80
          ATTEMPTS=0
          while [ $ATTEMPTS -lt $MAX_WAIT ]; do
            STATE=$(aws glue get-job-run \
              --job-name "${{ env.JOB_SILVER_GOLD }}" \
              --run-id "$RUN_ID" \
              --query "JobRun.JobRunState" \
              --output text 2>&1) || { echo "Error consultando estado: $STATE"; exit 1; }
            echo "[$(($ATTEMPTS * 30))s] Estado: $STATE"
            case "$STATE" in
              SUCCEEDED)
                echo "Job Silver-Gold completado exitosamente."
                exit 0
                ;;
              FAILED|ERROR|TIMEOUT|STOPPED)
                echo "Job fallido con estado: $STATE"
                aws glue get-job-run \
                  --job-name "${{ env.JOB_SILVER_GOLD }}" \
                  --run-id "$RUN_ID" \
                  --query "JobRun.ErrorMessage" \
                  --output text
                exit 1
                ;;
              *)
                ATTEMPTS=$(($ATTEMPTS + 1))
                sleep 30
                ;;
            esac
          done
          echo "Timeout: el job no terminó en 40 minutos."
          exit 1

      - name: Verificar tablas Gold creadas
        run: aws s3 ls "s3://${{ env.GOLD_BUCKET }}/" --recursive

  # ─────────────────────────────────────────────────────────
  # JOB 5: Linaje de datos en OpenMetadata
  # Solo corre si la variable OPENMETADATA_URL está definida
  # en el repositorio (Settings → Variables → Repository variables)
  # Ejemplo: OPENMETADATA_URL = http://mi-servidor:8585
  # ─────────────────────────────────────────────────────────
  lineage_openmetadata:
    name: "OpenMetadata - Registro de linaje"
    runs-on: ubuntu-latest
    needs: glue_silver_to_gold
    if: vars.OPENMETADATA_URL != ''
    continue-on-error: true        # No falla el pipeline si OM no está disponible

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Registrar linaje en OpenMetadata
        env:
          OM_HOST:     ${{ vars.OPENMETADATA_URL }}
          OM_EMAIL:    ${{ vars.OPENMETADATA_EMAIL || 'admin@open-metadata.org' }}
          OM_PASSWORD: ${{ secrets.OPENMETADATA_PASSWORD || 'admin' }}
          OM_TOKEN:    ${{ secrets.OPENMETADATA_TOKEN }}
        run: |
          echo "=== Registrando linaje en OpenMetadata ==="
          echo "Host: $OM_HOST"

          if [ -n "$OM_TOKEN" ]; then
            python openmetadata_lineage.py \
              --host "$OM_HOST" \
              --token "$OM_TOKEN"
          else
            python openmetadata_lineage.py \
              --host     "$OM_HOST" \
              --email    "$OM_EMAIL" \
              --password "$OM_PASSWORD"
          fi

      - name: Instrucciones para uso local
        if: always()
        run: |
          echo ""
          echo "=== Para registrar el linaje localmente ==="
          echo "1. Levantar OpenMetadata:"
          echo "   cd openmetadata && docker compose up -d"
          echo ""
          echo "2. Esperar ~2 min y abrir: http://localhost:8585"
          echo "   Login: admin@open-metadata.org / admin"
          echo ""
          echo "3. Ejecutar el script de linaje:"
          echo "   python openmetadata_lineage.py"
          echo ""
          echo "4. Ver el linaje en:"
          echo "   http://localhost:8585/explore/lineage"

