name: Pipeline SIVIGILA - Terraform + ETL + Glue

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:          # permite ejecutar manualmente desde GitHub

env:
  AWS_REGION:       us-east-1
  TF_WORKING_DIR:   Terraform/gestion_direccion_big_data/terraform/envs/dev
  BRONZE_BUCKET:    datalake-dev-raw-039781381637
  SILVER_BUCKET:    datalake-dev-silver-039781381637
  GOLD_BUCKET:      datalake-dev-gold-039781381637
  JOB_BRONZE_SILVER: datalake-dev-sivigila-etl
  JOB_SILVER_GOLD:   datalake-dev-sivigila-gold-etl
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Infraestructura con Terraform
  # ─────────────────────────────────────────────────────────
  terraform:
    name: "Terraform - Infraestructura AWS"
    runs-on: ubuntu-latest

    outputs:
      bronze_bucket: ${{ steps.tf_outputs.outputs.bronze_bucket }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -refresh=false -var-file="dev.tfvars" -detailed-exitcode -out=tfplan
          PLAN_EXIT=$?
          echo "plan_exit=$PLAN_EXIT" >> $GITHUB_OUTPUT
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "Error en terraform plan"
            exit 1
          fi
          echo "Plan OK (exit $PLAN_EXIT)"

      - name: Terraform Apply
        if: steps.plan.outputs.plan_exit == '2'
        run: terraform apply -auto-approve tfplan

      - name: Sin cambios detectados
        if: steps.plan.outputs.plan_exit == '0'
        run: echo "Infraestructura ya actualizada, sin cambios que aplicar."

      - name: Obtener outputs de Terraform
        id: tf_outputs
        run: |
          BRONZE=$(terraform output -raw bronze_bucket_name 2>/dev/null || echo "datalake-dev-raw-039781381637")
          echo "bronze_bucket=$BRONZE" >> $GITHUB_OUTPUT
          echo "Bronze bucket: $BRONZE"

  # ─────────────────────────────────────────────────────────
  # JOB 2: Subir datos y scripts al bucket Bronze  [v1.0]
  # ─────────────────────────────────────────────────────────
  upload:
    name: "Upload v1.0 - Datos y Glue jobs a S3"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── Datos ──────────────────────────────────────────────
      - name: "[DATA] Subir CSV SIVIGILA -> Bronze"
        run: |
          aws s3 cp sivigila_intsuicidio.csv \
            "s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv" \
            --no-progress
          echo "CSV subido: s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv"

      # ── Glue job scripts ───────────────────────────────────
      - name: "[SCRIPT] Glue job Bronze-Silver -> scripts/etl_sivigila.py"
        run: |
          aws s3 cp "Big Data AWS/glue_bronze_to_silver_sales.py" \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila.py"

      - name: "[SCRIPT] Glue job Silver-Gold -> scripts/etl_sivigila_gold.py"
        run: |
          aws s3 cp "Big Data AWS/glue_silver_to_gold_sivigila.py" \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila_gold.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/etl_sivigila_gold.py"

      - name: "[SCRIPT] Glue job Data Quality -> scripts/gx_data_quality.py"
        run: |
          aws s3 cp GX_Glue_Code.py \
            "s3://${{ env.BRONZE_BUCKET }}/scripts/gx_data_quality.py" \
            --no-progress
          echo "Script subido: s3://${{ env.BRONZE_BUCKET }}/scripts/gx_data_quality.py"

      # ── Verificacion ───────────────────────────────────────
      - name: "Verificar archivos en Bronze bucket"
        run: |
          echo "=== Contenido bucket Bronze ==="
          aws s3 ls "s3://${{ env.BRONZE_BUCKET }}/" --recursive --human-readable
          echo ""
          echo "=== Verificando archivos clave ==="
          aws s3api head-object --bucket "${{ env.BRONZE_BUCKET }}" --key "sivigila_intsuicidio.csv" \
            --query "{Size:ContentLength,Modified:LastModified}" --output table
          aws s3api head-object --bucket "${{ env.BRONZE_BUCKET }}" --key "scripts/etl_sivigila.py" \
            --query "{Size:ContentLength,Modified:LastModified}" --output table
          aws s3api head-object --bucket "${{ env.BRONZE_BUCKET }}" --key "scripts/etl_sivigila_gold.py" \
            --query "{Size:ContentLength,Modified:LastModified}" --output table
          aws s3api head-object --bucket "${{ env.BRONZE_BUCKET }}" --key "scripts/gx_data_quality.py" \
            --query "{Size:ContentLength,Modified:LastModified}" --output table
          echo "Todos los archivos verificados correctamente."

  # ─────────────────────────────────────────────────────────
  # JOB 3: Glue ETL Bronze - Silver
  # ─────────────────────────────────────────────────────────
  glue_bronze_to_silver:
    name: "Glue - Bronze - Silver"
    runs-on: ubuntu-latest
    needs: upload

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Lanzar Glue job Bronze-Silver
        id: start_job
        run: |
          RUN_ID=$(aws glue start-job-run \
            --job-name "${{ env.JOB_BRONZE_SILVER }}" \
            --arguments '{"--input_path":"s3://${{ env.BRONZE_BUCKET }}/sivigila_intsuicidio.csv","--output_path":"s3://${{ env.SILVER_BUCKET }}/sivigila/"}' \
            --query "JobRunId" \
            --output text)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Job lanzado con ID: $RUN_ID"

      - name: Esperar a que el job termine
        run: |
          RUN_ID="${{ steps.start_job.outputs.run_id }}"
          echo "Monitoreando job: $RUN_ID"
          while true; do
            STATE=$(aws glue get-job-run \
              --job-name "${{ env.JOB_BRONZE_SILVER }}" \
              --run-id "$RUN_ID" \
              --query "JobRun.JobRunState" \
              --output text)
            echo "Estado actual: $STATE"
            case "$STATE" in
              SUCCEEDED)
                echo "Job Bronze-Silver completado exitosamente."
                exit 0
                ;;
              FAILED|ERROR|TIMEOUT|STOPPED)
                echo "Job fallido con estado: $STATE"
                aws glue get-job-run \
                  --job-name "${{ env.JOB_BRONZE_SILVER }}" \
                  --run-id "$RUN_ID" \
                  --query "JobRun.ErrorMessage" \
                  --output text
                exit 1
                ;;
              *)
                echo "Esperando... (estado: $STATE)"
                sleep 30
                ;;
            esac
          done

  # ─────────────────────────────────────────────────────────
  # JOB 4: Glue ETL Silver - Gold
  # ─────────────────────────────────────────────────────────
  glue_silver_to_gold:
    name: "Glue - Silver - Gold"
    runs-on: ubuntu-latest
    needs: glue_bronze_to_silver

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Lanzar Glue job Silver-Gold
        id: start_job
        run: |
          RUN_ID=$(aws glue start-job-run \
            --job-name "${{ env.JOB_SILVER_GOLD }}" \
            --arguments '{"--input_path":"s3://${{ env.SILVER_BUCKET }}/sivigila/","--output_gold_resumen":"s3://${{ env.GOLD_BUCKET }}/sivigila_resumen_comuna/","--output_gold_riesgo":"s3://${{ env.GOLD_BUCKET }}/sivigila_perfil_riesgo/"}' \
            --query "JobRunId" \
            --output text)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Job lanzado con ID: $RUN_ID"

      - name: Esperar a que el job termine
        run: |
          RUN_ID="${{ steps.start_job.outputs.run_id }}"
          echo "Monitoreando job: $RUN_ID"
          while true; do
            STATE=$(aws glue get-job-run \
              --job-name "${{ env.JOB_SILVER_GOLD }}" \
              --run-id "$RUN_ID" \
              --query "JobRun.JobRunState" \
              --output text)
            echo "Estado actual: $STATE"
            case "$STATE" in
              SUCCEEDED)
                echo "Job Silver-Gold completado exitosamente."
                exit 0
                ;;
              FAILED|ERROR|TIMEOUT|STOPPED)
                echo "Job fallido con estado: $STATE"
                aws glue get-job-run \
                  --job-name "${{ env.JOB_SILVER_GOLD }}" \
                  --run-id "$RUN_ID" \
                  --query "JobRun.ErrorMessage" \
                  --output text
                exit 1
                ;;
              *)
                echo "Esperando... (estado: $STATE)"
                sleep 30
                ;;
            esac
          done

      - name: Verificar tablas Gold creadas
        run: aws s3 ls "s3://${{ env.GOLD_BUCKET }}/" --recursive
